name: Günlük bulmaca üret

# SAKİN SAATTE çalışır: 12:00 Türkiye saati = 09:00 UTC.
# Kullanıcıya görünen oyunu CRON DEĞİL, tarayıcı tarihi belirler (7 günlük kuyruk +
# istemci tarih seçimi) → gece 00:00'da yeni oyun deploy/cron beklemeden gelir.
# Cron sadece kuyruğu doldurur; gece yarısı kalabalığından kaçınmak için öğlene alındı.
# (GitHub cron UTC'dir ve birkaç dk gecikebilir; tampon bunu zaten tolere eder.)
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # Gerektiğinde elle de tetikleyebilirsin

permissions:
  contents: write          # daily.json + history.json commit'lemek için

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # rebase için tam geçmiş gerekir (shallow'da pull --rebase patlar)

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Eğer generator.js'in npm bağımlılığı yoksa bu adım atlanabilir.
      - name: Bağımlılıkları kur (varsa)
        run: npm ci || echo "npm ci atlandı (lockfile yok veya gerek yok)"

      - name: Bulmacayı üret
        run: node generator.js

      - name: Simya günlük kazanı üret + doğrula
        run: node generator-simya.js && node tools/verify-simya.js

      - name: Değişiklikleri commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/puzzles/*.json public/puzzles/simya/*.json
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
            exit 0
          fi
          git commit -m "chore: günlük bulmaca $(TZ=Europe/Istanbul date +%F)"
          # Dayanıklı push: checkout ile push arasında remote kıpırdarsa (elle push vb.)
          # rebase edip yeniden dener. Çakışmada ÜRETİLEN dosyalar kazanır (-X theirs = bizim commit).
          for i in 1 2 3 4 5; do
            if git push origin HEAD:master; then
              echo "✅ push başarılı (deneme $i)"
              exit 0
            fi
            echo "↩ push reddedildi, remote çekiliyor (deneme $i)..."
            git pull --rebase -X theirs origin master || git rebase --abort
            sleep $(( (RANDOM % 5) + 3 ))
          done
          echo "❌ 5 denemede push edilemedi"
          exit 1
