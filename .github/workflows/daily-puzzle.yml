name: Günlük bulmaca üret

# Her gece 00:00 Türkiye saati = 21:00 UTC
# (GitHub cron UTC'dir; cron birkaç dakika gecikebilir, bu normaldir)
on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # Gerektiğinde elle de tetikleyebilirsin

permissions:
  contents: write          # daily.json + history.json commit'lemek için

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Eğer generator.js'in npm bağımlılığı yoksa bu adım atlanabilir.
      - name: Bağımlılıkları kur (varsa)
        run: npm ci || echo "npm ci atlandı (lockfile yok veya gerek yok)"

      - name: Bulmacayı üret
        run: node generator.js

      - name: Değişiklikleri commit'le
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/puzzles/*.json
          if git diff --cached --quiet; then
            echo "Değişiklik yok, commit atlanıyor."
          else
            git commit -m "chore: günlük bulmaca $(TZ=Europe/Istanbul date +%F)"
            git push
          fi
